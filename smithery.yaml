# Smithery registry configuration for agent-trust-stack-mcp
# https://smithery.ai/docs/build/project-config/smithery-yaml

name: agent-trust-stack-mcp
description: |
  MCP server providing cryptographic provenance logging and decentralized reputation scoring
  for autonomous AI agents. Implements Chain of Consciousness (tamper-evident hash chains with
  Bitcoin OpenTimestamps anchoring) and Agent Rating Protocol (bilateral blind evaluation with
  anti-Goodhart protections). Part of the 7-protocol Agent Trust Stack for agent trust,
  accountability, and coordination infrastructure.

keywords:
  - agent-trust
  - provenance
  - reputation
  - chain-of-consciousness
  - mcp
  - autonomous-agents
  - cryptography
  - audit-trail
  - model-context-protocol
  - rating-protocol

homepage: https://vibeagentmaking.com
repository: https://github.com/alexfleetcommander/agent-trust-stack-mcp
license: Apache-2.0

startCommand:
  type: stdio

configSchema:
  type: object
  properties:
    chainDir:
      type: string
      description: "Directory for Chain of Consciousness chain files (default: ./chain)"
    ratingsDir:
      type: string
      description: "Directory for Agent Rating Protocol rating files (default: ./ratings)"
  required: []

commandFunction: |
  function(config) {
    const env = {};
    if (config.chainDir) env.COC_CHAIN_DIR = config.chainDir;
    if (config.ratingsDir) env.ARP_RATINGS_DIR = config.ratingsDir;
    return {
      command: "agent-trust-stack-mcp",
      args: [],
      env: env
    };
  }
